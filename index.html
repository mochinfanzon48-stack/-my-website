<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. أسامة سلطاني</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background-color: #1a5276;
            color: white;
            width: 100%;
            text-align: center;
            padding: 20px 0;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 600px;
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .btn {
            display: inline-block;
            background-color: #27ae60;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #219653; }
    </style>
</head>
<body>

    <div class="header">
        <h2>منصة أ. أسامة سلطاني</h2>
    </div>

    <div class="container">
        <div class="card">
            <h3>للوصول السريع للمنصة</h3>
            <img src="Ma_page_M_dias_sociaux.png" alt="QR Code" style="max-width: 200px; width: 100%;">
        </div>

        <div class="card">
            <h3>المقال أو البحث العلمي الجديد</h3>
            <a href="http://bit.ly/3wDX0PC" class="btn" target="_blank">تحميل الملف عبر Bitly</a>
        </div>
    </div>

</body>
</html>
