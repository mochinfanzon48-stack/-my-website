<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. أسامة سلطاني</title>
    
    <!-- ربط خط Reem Kufi Fun -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi+Fun:wght@400..700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Reem Kufi Fun', sans-serif;
            text-align: center;
            padding: 40px 20px;
            background-color: #fcfcfc;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .qr-container img {
            max-width: 300px; /* حجم مناسب للرمز */
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .qr-container img:hover {
            transform: scale(1.05); /* تأثير بسيط عند وضع الفأرة على الرمز */
        }
        p {
            margin-top: 25px;
            font-size: 1.2rem;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>منصة أ. أسامة سلطاني</h1>
    
    <div class="qr-container">
        <!-- استخدام اسم الملف الجديد بصيغة PNG -->
        <img src="my-qr-code.png" alt="QR Code للمنصة">
    </div>

    <p>للوصول السريع للمنصة، امسح الرمز أعلاه</p>

</body>
</html>
